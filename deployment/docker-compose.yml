version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ai_trader_postgres
    environment:
      POSTGRES_DB: ai_trader
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ai_trader_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: ai_trader_app
    depends_on:
      - postgres
      - redis
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    env_file:
      - ../.env
    volumes:
      - ../logs:/app/logs
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
